<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" id="rav-marker" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" 
     x="0px" y="0px" viewBox="0 0 64 80" style="enable-background:new 0 0 64 80;" xml:space="preserve">
<defs>
    <!-- Filter for drop shadow to make the marker pop from the map -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Outer metallic gold border gradient -->
    <linearGradient id="gold-border" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FFE082" />
        <stop offset="30%" stop-color="#FFB300" />
        <stop offset="70%" stop-color="#FF8F00" />
        <stop offset="100%" stop-color="#8D6E63" />
    </linearGradient>

    <!-- Inner dark amber glass background -->
    <!-- <linearGradient id="glass-bg" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#e9e1db" />
        <stop offset="100%" stop-color="#d4cac2" />
    </linearGradient> -->

    <!-- Rich, glowing amber gem radial gradient -->
    <radialGradient id="amber-glow" cx="50%" cy="40%" r="50%" fx="35%" fy="30%">
        <stop offset="0%" stop-color="#FFF59D" />
        <stop offset="20%" stop-color="#FBC02D" />
        <stop offset="55%" stop-color="#F57F17" />
        <stop offset="90%" stop-color="#E65100" />
        <!-- <stop offset="100%" stop-color="#3E2723" /> -->
    </radialGradient>

    <!-- Glossy reflection overlay gradient -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6" />
        <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.1" />
        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
</defs>

<!-- Group with shadow -->
<g filter="url(#shadow)">
    
    <!-- Outer Pin Shape (Inverted Teardrop) -->
    <path fill="url(#gold-border)" d="M32,74C32,74,58,49.2,58,32C58,17.6,46.4,6,32,6S6,17.6,6,32C6,49.2,32,74,32,74z"/>
    
    <!-- Inner Pin Path (Creates the border width effect) -->
    <path fill="url(#glass-bg)" d="M32,70.5C32,70.5,54.5,47.5,54.5,32C54.5,19.6,44.4,9.5,32,9.5S9.5,19.6,9.5,32C9.5,47.5,32,70.5,32,70.5z"/>
    
    <!-- The Amber Gem (Teardrop-shaped crystal inside, pointing up for visual balance inside the pin) -->
    <path fill="url(#amber-glow)" d="M32,15.5c0,0-15.5,15.5-15.5,23.3c0,8.6,6.9,15.5,15.5,15.5s15.5-6.9,15.5-15.5C47.5,31,32,15.5,32,15.5z"/>
    

    <!-- Glossy reflection overlay on the top-left of the amber gem -->
    <path fill="url(#gloss)" d="M32,17c0,0-13,13-13,19.5c0,4,1.8,7.5,4.5,10C21,41,25,32,32,25c4.5,0,9,3,10,7C43,26,38.5,20,32,17z" opacity="0.8"/>
    
    <!-- Small bright highlight dot for extra realism -->
    <circle fill="#FFFFFF" cx="25" cy="27" r="2" opacity="0.8"/>
</g>
</svg>
